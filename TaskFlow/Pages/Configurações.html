<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Configurações</title>
  <link rel="stylesheet" href="../style.css" />
</head>
<body>
  <header class="topo">
    <h1 class="logo">TaskFlow</h1>
  </header>

  <nav class="menu-lateral">
    <a href="index.html">📋 Tarefas</a>
    <a href="concluidas.html">✅ Concluídas</a>
    <a href="configuracoes.html" class="ativo">⚙️ Configurações</a>
  </nav>

  <main class="conteudo">
    <section id="config">
      <h2>Configurações</h2>

      <div class="caixa-config">
        <label>Alterar nome:</label>
        <input id="novo-nome" type="text" placeholder="Digite seu nome" />
        <button id="salvar-nome">Salvar</button>
      </div>

      <div class="caixa-config">
        <label>Tema:</label>
        <button id="tema-claro">Claro</button>
        <button id="tema-escuro">Escuro</button>
      </div>

      <div class="caixa-config">
        <button id="limpar-tarefas">🧹 Limpar todas as tarefas</button>
        <button id="resetar-tudo" class="perigo">⚠️ Resetar tudo</button>
      </div>
    </section>
  </main>

  <script src="../script.js"></script>
</body>
</html>
